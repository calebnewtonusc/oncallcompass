---
# OncallCompass DPO Alignment Configuration
# Used by training/train_dpo.py

model:
  base: checkpoints/rl
  torch_dtype: bfloat16

dpo:
  beta: 0.1           # KL penalty coefficient
  max_length: 2048

training:
  output_dir: checkpoints/final
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_strategy: epoch
  report_to: none
  run_name: oncallcompass-dpo

data:
  dpo_path: data/dpo_pairs.jsonl

deepspeed: training/configs/deepspeed_zero3.json
